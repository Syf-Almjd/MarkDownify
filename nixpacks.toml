[phases.setup]
# Added 'pixman' to satisfy the final canvas requirement
nixPkgs = ["...", "python3", "pkg-config", "cairo", "pango", "libjpeg", "giflib", "librsvg", "pixman"]

[phases.install]
# Nuke the cached modules/lockfile to clear out Windows/Mac binaries, then install fresh
cmds = [
    "rm -rf node_modules pnpm-lock.yaml",
    "pnpm install"
]