[phases.setup]
# Retain default Node setup ("..."), but add Python and the C++ libraries needed to compile 'canvas'
nixPkgs = ["...", "python3", "pkg-config", "cairo", "pango", "libjpeg", "giflib", "librsvg"]

[phases.install]
# Override the default install command to drop the frozen lockfile constraint
# This forces pnpm to reach out and grab the missing Linux oxc-parser binaries
cmds = ["pnpm install --no-frozen-lockfile"]